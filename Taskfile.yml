version: 3

tasks:
  clean:
    desc: Clean
    cmds:
      - rm -rf build dist

  install:
    desc: Install dependencies
    cmds:
      - pnpm install
      - pnpm prune

  build-lib:
    desc: Build lib
    dir: ../leaflet-tracksymbol2
    cmds:
      - eval `mise env` && task build

  install-lib:
    desc: Install lib
    deps: [ build-lib ]
    cmds:
      - pnpm uninstall @arl/leaflet-tracksymbol2
      - pnpm install ../leaflet-tracksymbol2

  build:
    desc: Build
    deps: [ install ]
    cmds:
      - pnpm build

  dev:
    desc: Dev
    deps: [ install ]
    cmds:
      - pnpm run dev
